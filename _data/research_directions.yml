# Research hotspots are data-driven so topics, people, and outputs can be
# refined as the research agenda evolves.

- id: sparse-tensor-algorithms
  accent: "teal"
  title: "Sparse Tensor Algorithms and Performance Optimization"
  status: "Research Hotspot"
  summary: "Algorithms, formats, scheduling strategies, and runtime optimizations for irregular sparse matrix and tensor workloads."
  keywords:
    - "Sparse tensor kernels"
    - "SpMV / SpMM / SpTTM / SpTC"
    - "Load balancing"
    - "Heterogeneous acceleration"
  expected_goals:
    - "Build a reusable sparse tensor algorithm toolbox covering core matrix and tensor operators."
    - "Design input-aware partitioning, storage, and scheduling methods that reduce irregular memory access and synchronization overhead."
    - "Establish reproducible benchmark suites across CPU, GPU, and domain-specific acceleration platforms."
    - "Publish system-level results in high-performance computing, computer architecture, and parallel computing venues."
  publications:
    - title: "A Novel Parallel Algorithm for Sparse Tensor Matrix Chain Multiplication via TCU-Acceleration"
      venue: "IEEE TPDS"
      year: 2023
    - title: "A Heterogeneous Parallel Computing Approach Optimizing SpTTM on CPU-GPU via GCN"
      venue: "ACM TOPC"
      year: 2023
    - title: "IAP-SpTV: An Input-Aware Adaptive Pipeline SpTV via GCN on CPU-GPU"
      venue: "JPDC"
      year: 2023
    - title: "BCB-SpTC: An Efficient Sparse High-Dimensional Tensor Contraction Employing Tensor Core Acceleration"
      venue: "IEEE TPDS"
      year: 2024
  organization:
    leader:
      name: "Haotian Wang"
      role: "Lead"
      focus: "Planning"
    members:
      - name: "Algorithm researcher"
        role: "Algorithms"
        focus: "Formats"
      - name: "Kernel optimization member"
        role: "Kernels"
        focus: "CPU/GPU"
      - name: "Benchmark and evaluation member"
        role: "Evaluation"
        focus: "Benchmarks"

- id: codegen-compiler-optimization
  accent: "indigo"
  title: "Code Generation and Compiler Optimization"
  status: "Research Hotspot"
  summary: "Sparse-aware compilation, automatic scheduling, vectorized code generation, and AI-assisted optimization."
  keywords:
    - "Tensor compiler"
    - "Sparse code generation"
    - "Auto scheduling"
    - "AI-assisted optimization"
  expected_goals:
    - "Develop compiler abstractions that expose sparse structure, hardware constraints, and optimization choices."
    - "Generate vectorized and parallel code for sparse operators with predictable performance across platforms."
    - "Explore AI-assisted schedule search, cost modeling, and code repair for compiler optimization loops."
    - "Connect compiler prototypes with real operator libraries and application workloads."
  publications:
    - title: "SparseMode: A Sparse Compilation Framework for Efficient SpMV Vectorized Code Generation"
      venue: "Journal of Computer Research and Development"
      year: 2025
    - title: "An Input-Aware Sparse Tensor Compiler Empowered by Vectorized Acceleration"
      venue: "DAC"
      year: 2025
    - title: "A Context-Awareness and Hardware-Friendly Sparse Matrix Multiplication Kernel for CNN Inference Acceleration"
      venue: "IEEE TC"
      year: 2024
  organization:
    leader:
      name: "Haotian Wang"
      role: "Lead"
      focus: "Architecture"
    members:
      - name: "Compiler infrastructure member"
        role: "Compiler"
        focus: "IR"
      - name: "Auto-optimization member"
        role: "Auto-tuning"
        focus: "Search"
      - name: "Application integration member"
        role: "Systems"
        focus: "Library"

